name: Publish

on:
  push:
    tags:
      - "*"

  workflow_dispatch:

jobs:
  # Build for linux platforms
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

          - runner: ubuntu-latest
            target: x86
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

          - runner: ubuntu-latest
            target: aarch64
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

          - runner: ubuntu-latest
            target: armv7
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

          - runner: ubuntu-latest
            target: s390x
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

          - runner: ubuntu-latest
            target: ppc64le
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: "Install UV"
        uses: astral-sh/setup-uv@v6

      - name: "Build"
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
          rust-toolchain: nightly

      - name: "Upload"
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  # Build for musllinux platforms
  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

          - runner: ubuntu-latest
            target: x86
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

          - runner: ubuntu-latest
            target: aarch64
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

          - runner: ubuntu-latest
            target: armv7
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: "Install UV"
        uses: astral-sh/setup-uv@v6

      - name: "Build"
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
          rust-toolchain: nightly

      - name: "Upload"
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  # Build for windows platforms
  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: window-latest
            target: x64
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

          - runner: window-latest
            target: x86
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: "Install UV"
        uses: astral-sh/setup-uv@v6

      - name: "Build"
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          rust-toolchain: nightly

      - name: "Upload"
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  # Build for MacOS platforms
  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: x86_64
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

          - runner: macos-latest
            target: aarch64
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: "Install UV"
        uses: astral-sh/setup-uv@v6

      - name: "Build"
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          rust-toolchain: nightly

      - name: "Upload"
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  # Build sdist
  build-sdist:
    name: "build sdist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: install uv
        uses: astral-sh/setup-uv@v6

      - name: "Build sdist"
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          rust-toolchain: nightly

      - name: "Upload"
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: "release"
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, musllinux, windows, macos, build-sdist]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write

    steps:
      - uses: actions/download-artifact@v5
      - name: "Generate artifact attestation"
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "wheels-*/*"

      - name: "Publish to PyPI"
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: PyO3/maturin-action@v1.49.4
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
          rust-toolchain: nightly
