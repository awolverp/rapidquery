name: Publish

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - {
              runner: ubuntu-latest,
              target: x86_64,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }
          - {
              runner: ubuntu-latest,
              target: x86,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }
          - {
              runner: ubuntu-latest,
              target: aarch64,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }
          - {
              runner: ubuntu-latest,
              target: armv7,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }
          - {
              runner: ubuntu-latest,
              target: s390x,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }
          - {
              runner: ubuntu-latest,
              target: ppc64le,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
          rust-toolchain: nightly

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - {
              runner: ubuntu-latest,
              target: x86_64,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }
          - {
              runner: ubuntu-latest,
              target: x86,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }
          - {
              runner: ubuntu-latest,
              target: aarch64,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }
          - {
              runner: ubuntu-latest,
              target: armv7,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
          rust-toolchain: nightly

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          # x86 does not support PyPy
          - {
              runner: windows-latest,
              target: x64,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }
          - {
              runner: windows-latest,
              target: x86,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t",
            }

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          architecture: ${{ matrix.platform.target }}

      - uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          rust-toolchain: nightly

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - {
              runner: macos-latest,
              target: x86_64,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }
          - {
              runner: macos-latest,
              target: aarch64,
              interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11",
            }

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          rust-toolchain: nightly

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: PyO3/maturin-action@v1.51.0
        with:
          command: sdist
          args: --out dist
          rust-toolchain: nightly

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, musllinux, windows, macos, build-sdist]
    permissions:
      id-token: write # signing release artifacts
      contents: write # uploading release artifacts
      attestations: write

    steps:
      - uses: actions/download-artifact@v5

      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: "wheels-*/*"

      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: PyO3/maturin-action@v1.51.0
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
          rust-toolchain: nightly
